[program:studai-worker-high]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/studai-career/artisan queue:work redis --queue=high --sleep=3 --tries=3 --max-time=3600 --timeout=90
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/www/studai-career/storage/logs/worker-high.log
stopwaitsecs=3600

